<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FLE — First Letter Extractor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Serif+Display&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #171719;
    --border: #2a2a2e;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #c8ff57;
    --accent-dim: #9ec93d;
    --mono: 'Space Mono', monospace;
    --serif: 'DM Serif Display', serif;
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    display: grid;
    place-items: center;
    min-height: 100%;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 680px;
  }

  header {
    margin-bottom: 2.5rem;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  h1 {
    font-family: var(--serif);
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 400;
    line-height: 1;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .desc {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  .section {
    margin-bottom: 1.25rem;
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.65;
    padding: 0.85rem 1rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
    border-radius: 2px;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  #input-box {
    min-height: 200px;
  }

  #output-box {
    min-height: 72px;
    color: var(--accent);
    letter-spacing: 0.12em;
    word-break: break-all;
    resize: none;
    cursor: default;
  }

  .actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  button {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.55rem 1.1rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
    border-radius: 2px;
  }

  button:hover:not(:disabled) {
    color: var(--text);
    border-color: var(--text);
  }

  button:disabled {
    opacity: 0.3;
    cursor: default;
  }

  #copy-btn {
    border-color: var(--accent);
    color: var(--accent);
  }

  #copy-btn:hover:not(:disabled) {
    background: var(--accent);
    color: var(--bg);
  }

  #copy-btn.copied {
    background: var(--accent);
    color: var(--bg);
  }

  .count {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 0.4rem;
    text-align: right;
    min-height: 1.2em;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <p class="label">utility / text</p>
    <h1>First<br>Letter<br><span>Extractor</span></h1>
    <p class="desc">Extracts the first letter of each word. Punctuation is stripped.</p>
  </header>

  <div class="section">
    <p class="section-label">Input</p>
    <textarea id="input-box" placeholder="Paste text here..." autocomplete="off" spellcheck="false"></textarea>
  </div>

  <div class="section">
    <p class="section-label">Output</p>
    <textarea id="output-box" readonly></textarea>
    <p class="count" id="count"></p>
  </div>

  <div class="actions">
    <button id="copy-btn" disabled>Copy</button>
    <button id="clear-btn">Clear</button>
  </div>
</div>

<script>
  const input = document.getElementById('input-box');
  const output = document.getElementById('output-box');
  const copyBtn = document.getElementById('copy-btn');
  const clearBtn = document.getElementById('clear-btn');
  const countEl = document.getElementById('count');

  function extract(text) {
    return text
      .split(/\s+/)
      .map(w => w.replace(/[^\p{L}\p{N}]/gu, ''))
      .filter(Boolean)
      .map(w => w[0])
      .join('');
  }

  function update() {
    const result = extract(input.value);
    output.value = result;
    copyBtn.disabled = !result;
    countEl.textContent = result ? result.length + ' letters' : '';
  }

  input.addEventListener('input', update);

  copyBtn.addEventListener('click', async () => {
    if (!output.value) return;
    await navigator.clipboard.writeText(output.value);
    copyBtn.textContent = 'Copied';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = 'Copy';
      copyBtn.classList.remove('copied');
    }, 1200);
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    update();
    input.focus();
  });
</script>
</body>
</html>
